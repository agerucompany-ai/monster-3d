# Render Blueprint — モンスター戦略3D（対CPU＋オンライン対戦）
# 2サービス構成:
#   1) monster-3d        : 単一HTML(index.html)を配る静的サイト（=ゲーム本体）
#   2) monster3d-server-agc : WebSocket中継サーバー (Node)。client の DEFAULT_WS と名前を一致させること。
#
# 既に monster-3d（静的）を手動作成済みの場合は、server だけを
# New → Web Service → このリポジトリ → Root Directory = server で追加すればよい。

services:
  # --- ゲーム本体（単一HTML 静的配信） ---
  - type: web
    name: monster-3d
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- WebSocket中継サーバー ---
  - type: web
    name: monster3d-server-agc
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
