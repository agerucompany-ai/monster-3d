name: keepalive

# Render Free Tier は 15 分アイドルでスリープする。
# 5 分ごとに /health を叩いて起こし続け、対局中にサーバーが寝るのを防ぐ。
# ※ サーバーのURLが monster-3d-server 以外になった場合は下の URL を直すこと。
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping ws server
        run: |
          set -e
          for i in 1 2 3; do
            code=$(curl -sS -o /tmp/r -w "%{http_code}" -m 30 https://monster3d-server-agc.onrender.com/health || echo "000")
            cat /tmp/r || true
            echo
            echo "http=$code attempt=$i"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          exit 0
